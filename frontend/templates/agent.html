<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph Agent WebUI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            min-height: 100px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            border: 1px solid #ddd;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 4px;
            white-space: pre-wrap; /* 改行を保持 */
        }
        .result-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .error-message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid red;
            background-color: #ffebeb;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LangGraph Agent Tester</h1>
        
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/agent">
            <label for="prompt_input">プロンプトを入力:</label>
            <textarea id="prompt_input" name="prompt_input" required>{{ input_prompt }}</textarea>
            <button type="submit">エージェントに送信</button>
        </form>

        {% if response %}
            <div class="result-title">エージェントの応答:</div>
            <div class="result-box">
                {{ response }}
            </div>
        {% endif %}
    </div>
</body>
</html>
